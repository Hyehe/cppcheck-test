name: CPPCheck

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CPPCheck
        run: sudo apt-get install -y cppcheck

      - name: Run CPPCheck
        run: cppcheck --enable=all --error-exitcode=1 ./